<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Día de la Familia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="icon" href="data:image/x-icon;," type="image/x-icon">
  <link rel="stylesheet" href="./css/index.css"/>
  <script src="js/sweetalert2.all.min.js"></script>
  <script src="./js/index.js" type="module"></script>
</head>

<body>
  <canvas id="canvas" style="display:none;position:absolute;z-index:4000"></canvas>

  <header class="topbar">
    <p class="kicker">Día de la Familia</p>
    <h1>Gran Rifa <em>2026</em></h1>
  </header>

  <div class="gui-wrapper">
    <div class="dgrid">
      <div><label>Grado</label><select class="select2"></select></div>
      <span class="item"></span>
      <button id="spininit">Init</button>
      <button id="spin">Girar</button>
    </div>
  </div>

  <div class="wheel-wrapper"></div>

  <video class="corner-video" src="mp4.mp4" autoplay loop muted playsinline></video>
</body>

</html>
